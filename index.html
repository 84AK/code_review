<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Code Review Pro | 2026 Edition</title>
  <link rel="stylesheet" href="src/styles/main.css">
  <!-- CDNs -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
  <div class="bg-glow"></div>
  
  <div class="container">
    <header>
      <div class="title-group">
        <h1>AI Code Review <span style="font-size: 1rem; vertical-align: middle; opacity: 0.7;">v3.1</span></h1>
        <p>학생들의 코드를 정밀하게 분석하고 피드백을 제공합니다.</p>
      </div>
      <div class="header-actions">
        <button id="settings-btn" class="bento-card" style="padding: 0.75rem 1.5rem; border-radius: 1rem;">
          <i data-lucide="settings" style="width: 1.2rem; display: inline-block; vertical-align: middle; margin-right: 0.5rem;"></i>
          설정
        </button>
      </div>
    </header>

    <main class="bento-grid">
      <!-- Category Selection -->
      <section class="bento-card card-category">
        <h2 style="margin-bottom: 1.5rem;"><i data-lucide="layers"></i> 카테고리 선택</h2>
        <div style="display: flex; flex-direction: column; gap: 1rem;">
          <label class="category-option">
            <input type="radio" name="category" value="MBTI" checked>
            <div>
              <div style="font-weight: 700;">MBTI 테스트</div>
              <div style="font-size: 0.8rem; color: var(--text-dim);">HTML/CSS/JS 기초 웹</div>
            </div>
          </label>
          <label class="category-option">
            <input type="radio" name="category" value="POSE">
            <div>
              <div style="font-weight: 700;">POSE 게임</div>
              <div style="font-size: 0.8rem; color: var(--text-dim);">Teachable Machine 인공지능 게임</div>
            </div>
          </label>
        </div>
      </section>

      <!-- Upload Area -->
      <section class="bento-card card-upload" id="drop-zone">
        <div class="upload-icon"><i data-lucide="upload-cloud" style="width: 4rem; height: 4rem;"></i></div>
        <h2 style="margin-bottom: 0.5rem;">학생 제출물 업로드</h2>
        <p style="color: var(--text-dim); margin-bottom: 2rem;">여러 개의 .zip 또는 .html 파일을 여기에 드래그하거나 클릭하세요.</p>
        <input type="file" id="file-input" multiple accept=".zip,.html" style="display: none;">
        <button class="btn-primary" onclick="document.getElementById('file-input').click()">파일 선택하기</button>
      </section>

      <!-- Stats -->
      <section class="bento-card card-stats" style="display: flex; flex-direction: column; justify-content: center; align-items: center;">
        <div id="file-count" style="font-size: 3rem; font-weight: 900; color: var(--primary);">0</div>
        <div style="color: var(--text-dim);">대기 중인 파일</div>
      </section>

      <!-- Status / Progress -->
      <section class="bento-card card-status">
        <h3 style="margin-bottom: 1rem;"><i data-lucide="activity"></i> 분석 상태</h3>
        <div id="progress-container" style="display: none;">
          <div style="display: flex; justify-content: space-between; margin-bottom: 0.5rem;">
            <span id="status-text">처리 중...</span>
            <span id="progress-percent">0%</span>
          </div>
          <div style="height: 10px; background: rgba(255,255,255,0.1); border-radius: 5px; overflow: hidden;">
            <div id="progress-bar" style="height: 100%; width: 0%; background: var(--primary); transition: width 0.3s;"></div>
          </div>
        </div>
        <div id="status-placeholder" style="color: var(--text-dim); font-style: italic;">
          파일을 업로드하면 분석이 시작됩니다.
        </div>
      </section>

      <!-- Results List -->
      <section class="bento-card card-results">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
          <div>
            <h2><i data-lucide="clipboard-check"></i> 분석 결과 리포트</h2>
          </div>
          <div style="display: flex; gap: 1rem; align-items: center;">
            <button id="export-btn" class="bento-card" style="padding: 0.5rem 1rem; border-radius: 0.75rem; font-size: 0.85rem; display: flex; align-items: center; gap: 0.5rem; background: rgba(16, 185, 129, 0.1); border-color: rgba(16, 185, 129, 0.2); color: #10b981;">
              <i data-lucide="download" style="width: 1rem;"></i>
              Excel 다운로드
            </button>
            <button id="clear-btn" style="background: none; border: none; color: var(--text-dim); cursor: pointer; font-size: 0.9rem;">초기화</button>
          </div>
        </div>
        <div id="results-list" class="results-container">
          <!-- Result cards will be injected here -->
        </div>
      </section>
    </main>
  </div>

  <!-- Settings Modal -->
  <div id="modal-backdrop" style="display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); z-index: 1000; justify-content: center; align-items: center;">
    <div class="bento-card" style="width: 100%; max-width: 500px; position: relative;">
      <h2><i data-lucide="settings"></i> 설정</h2>
      <div style="margin: 2rem 0;">
        <label style="display: block; margin-bottom: 0.5rem; color: var(--text-dim);">Gemini API Key</label>
        <input type="password" id="api-key-input" style="width: 100%; padding: 1rem; border-radius: 0.5rem; border: 1px solid var(--glass-border); background: rgba(0,0,0,0.3); color: white;" placeholder="AI Studio에서 발급받은 키를 입력하세요.">
        <div id="api-key-status" style="margin-top: 0.5rem; font-size: 0.85rem; display: none;"></div>
        <p style="color: var(--text-dim); font-size: 0.85rem; margin-top: 1rem;">입력한 키는 브라우저에만 안전하게 저장됩니다.</p>
        <button class="btn-primary" id="save-api-key" style="margin-top: 2rem; width: 100%;">저장하기</button>
      </div>
    </div>
  </div>

  <script type="module" src="app.js"></script>
  <script>
    lucide.createIcons();
  </script>
</body>
</html>
